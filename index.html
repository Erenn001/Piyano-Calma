<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Kamera Piyano PRO</title>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <style>
        body {
            margin: 0;
            background: #000;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* 📢 Üst Panel */
        .info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 15px 20px;
            border-radius: 10px;
            backdrop-filter: blur(5px);
            z-index: 10;
        }

        .info h1 { margin: 0; font-size: 20px; }
        .info p { margin: 5px 0 0; font-size: 14px; opacity: 0.8; }

        /* 🎹 Piyano Alanı */
        .piano-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 220px;
            z-index: 5;
        }

        .white-keys {
            display: flex;
            width: 100%;
            height: 100%;
        }

        .key.white {
            flex: 1;
            background: linear-gradient(to bottom, #fff, #ddd);
            border: 1px solid #000;
            border-radius: 0 0 5px 5px;
            transition: 0.1s;
        }

        .key.white.active {
            background: gold;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.2);
        }

        /* Siyah Tuş Görselleri */
        .black-markers {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 60%;
            z-index: 6;
            pointer-events: none;
        }

        .marker {
            position: absolute;
            background: #000;
            width: 6%;
            height: 100%;
            border-radius: 0 0 3px 3px;
        }
    </style>
</head>
<body>

<video id="video" style="display:none"></video>
<canvas id="canvas"></canvas>

<div class="info">
    <h1>🎹 Kamera ile Piyano</h1>
    <p>Ekrana tıkla → tam ekran ve ses</p>
</div>

<div class="piano-container">
    <div class="white-keys">
        <div class="key white" data-note="C"></div>
        <div class="key white" data-note="D"></div>
        <div class="key white" data-note="E"></div>
        <div class="key white" data-note="F"></div>
        <div class="key white" data-note="G"></div>
        <div class="key white" data-note="A"></div>
        <div class="key white" data-note="B"></div>
        <div class="key white" data-note="C2"></div>
    </div>

    <div class="black-markers">
        <div class="marker" style="left: 9.5%"></div>
        <div class="marker" style="left: 22%"></div>
        <div class="marker" style="left: 47%"></div>
        <div class="marker" style="left: 59.5%"></div>
        <div class="marker" style="left: 72%"></div>
    </div>
</div>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const sounds = {
    C: new Audio("C.wav"), D: new Audio("D.wav"), E: new Audio("E.wav"),
    F: new Audio("F.wav"), G: new Audio("G.wav"), A: new Audio("A.wav"),
    B: new Audio("B.wav"), C2: new Audio("C2.wav")
};

let audioEnabled = false;
function play(note) {
    if(!audioEnabled) return;
    let s = sounds[note].cloneNode();
    s.play();
}

const hands = new Hands({
    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
});

hands.setOptions({
    maxNumHands: 2,
    modelComplexity: 1,
    minDetectionConfidence: 0.7,
    minTrackingConfidence: 0.7
});

let activeStatus = {};

hands.onResults(res => {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.save();
    ctx.scale(-1,1);
    ctx.drawImage(res.image, -canvas.width, 0, canvas.width, canvas.height);
    ctx.restore();

    let currentFrameNotes = new Set();

    if(res.multiHandLandmarks){
        res.multiHandLandmarks.forEach(hand => {
            let x = (1 - hand[8].x) * canvas.width;
            let y = hand[8].y * canvas.height;

            ctx.beginPath();
            ctx.arc(x,y,10,0,2*Math.PI);
            ctx.fillStyle="lime";
            ctx.fill();

            document.querySelectorAll(".key.white").forEach(k => {
                let r = k.getBoundingClientRect();
                if(x > r.left && x < r.right && y > r.top){
                    currentFrameNotes.add(k.dataset.note);
                }
            });
        });
    }

    document.querySelectorAll(".key.white").forEach(k => {
        let note = k.dataset.note;
        if(currentFrameNotes.has(note)){
            if(!activeStatus[note]){
                play(note);
                k.classList.add("active");
                activeStatus[note] = true;
            }
        } else {
            k.classList.remove("active");
            activeStatus[note] = false;
        }
    });
});

const camera = new Camera(video, {
    onFrame: async () => { await hands.send({image: video}); },
    width: 640, height: 480
});
camera.start();

document.body.onclick = () => {
    audioEnabled = true;
    document.body.requestFullscreen();
};
</script>

</body>
</html>
